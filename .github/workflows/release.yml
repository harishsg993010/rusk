name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: rusk-Linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: rusk-Linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: rusk-Darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: rusk-Darwin-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: rusk-Windows-x86_64.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: rusk-Windows-aarch64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p rusk-cli

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/rusk ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item "target/${{ matrix.target }}/release/rusk.exe" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          for dir in */; do
            cp "$dir"* ../
          done
          cd ..
          sha256sum rusk-* > checksums-sha256.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            rusk-Linux-x86_64
            rusk-Linux-aarch64
            rusk-Darwin-x86_64
            rusk-Darwin-aarch64
            rusk-Windows-x86_64.exe
            rusk-Windows-aarch64.exe
            checksums-sha256.txt
